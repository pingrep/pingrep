# Publish to npm on version tags (v0.1.2, v1.0.0, ...).
# Auth: npm trusted publishing (OIDC) — no token secret needed.
# One-time setup on npmjs.com: package Settings → Trusted Publisher →
# GitHub Actions, repo pingrep/pingrep, workflow release.yml.
# Release flow: npm version patch && git push && git push --tags
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm test
      # Trusted publishing requires npm >= 11.5.1 (node 20 ships older).
      - run: npm install -g npm@latest
      - run: npm publish
